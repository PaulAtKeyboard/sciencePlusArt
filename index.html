<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="description" content="I design and build things that are beautiful and just work."/>
        <meta name="author" content="Paul@Keyboard" />
        <meta name="viewport" content="width=device-width, initial-scale=1"/>

        <!-- Canonical -->
        <link rel="canonical" href="https://scienceplus.art/" />

        <!-- Favicons -->
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
        <link rel="icon" href="/favicon.ico" />
        <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
        <link rel="manifest" href="/site.webmanifest" />

        <!-- Open Graph (Slack, Teams, LinkedIn, iMessage, WhatsApp, Facebook) -->
        <meta property="og:type" content="profile" />
        <meta property="og:site_name" content="Science + Art" />
        <meta property="og:title" content="Science + Art — Paul@Keyboard" />
        <meta property="og:description" content="I design and build things that are beautiful and just work." />
        <meta property="og:url" content="https://scienceplus.art/" />
        <meta property="og:image" content="https://scienceplus.art/OG.jpg" />
        <meta property="og:image:secure_url" content="https://scienceplus.art/OG.jpg" />
        <meta property="og:image:type" content="image/jpeg" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta property="og:image:alt" content="Science + Art — with the tagline." />
        <meta property="og:locale" content="en_NZ" />

        <!-- Twitter / X -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Science + Art — Paul@Keyboard" />
        <meta name="twitter:description" content="I design and build things that are beautiful and just work." />
        <meta name="twitter:image" content="https://scienceplus.art/OG.jpg" />
        <meta name="twitter:image:alt" content="Science + Art — the P logo on black with the tagline." />

        <!-- Browser chrome tint (matches the black site) -->
        <meta name="theme-color" content="#000000" />

        <!--Google Fonts-->
        <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400&display=swap" rel="stylesheet"/>

        <style>
            /* ============================================================
               Base layout — replaces Bulma. We only used a handful of its
               layout/typography primitives; these values mirror Bulma 1.0
               so the page renders identically with no CDN dependency.
               ============================================================ */
            *,
            *::before,
            *::after {
                box-sizing: border-box;
            }

            html {
                background: black;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            body {
                margin: 0;
                line-height: 1.5;
                font-family: "Roboto Mono", monospace;
            }

            h1,p {
                margin: 0;
            }

            /* Bulma reset the default underline on links; preserve that so
               the map link relies on its border-bottom hover effect. */
            a {
                text-decoration: none;
            }

            /* full-height hero (Bulma .hero.is-fullheight + .hero-body) */
            .hero {
                display: flex;
                flex-direction: column;
            }

            .hero.is-fullheight {
                min-height: 100vh;
            }

            .hero-body {
                flex-grow: 1;
                display: flex;
                align-items: center;
                padding: 3rem 1.5rem;
                background-color: black;
            }

            /* centered max-width wrapper (Bulma .container) */
            .container {
                width: auto;
                margin: 0 auto;
                position: relative;
            }

            @media screen and (min-width: 1024px) {
                .container {
                    max-width: 960px;
                }
            }

            @media screen and (min-width: 1216px) {
                .container {
                    max-width: 1152px;
                }
            }

            @media screen and (min-width: 1408px) {
                .container {
                    max-width: 1344px;
                }
            }

            .has-text-centered {
                text-align: center;
            }

            /* headings (Bulma .title.is-5 / .subtitle.is-6) */
            .title {
                color: rgba(187, 187, 187, 0.9);
                font-size: 1.25rem;
                font-weight: 600;
                line-height: 1.125;
            }

            .subtitle {
                color: rgba(187, 187, 187, 0.7);
                font-size: 1rem;
                font-weight: 400;
                line-height: 1.25;
            }

            /* inline icon box (Bulma .icon) */
            .icon {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 1.5rem;
                height: 1.5rem;
            }

            @media only screen and (min-width: 768px) {
                #ppp {
                    width: 90%;
                }
            }

            @media only screen and (min-width: 992px) {
                #ppp {
                    width: 60%;
                }
            }

            #ppp .title {
                margin-bottom: 1.5em;
            }

            #ppp .subtitle {
                max-width: 480px;
                margin-left: auto;
                margin-right: auto;
            }

            #portfolioMenu {
                padding: 0;
                margin-bottom: 2em;
                color: #f22163;
                font-size: 16pt;
                font-style: italic;
            }

            #liveMap {
                margin-top: 2.5em;
            }

            #liveMap a {
                color: #f22163;
                letter-spacing: 0.04em;
                border-bottom: 1px solid transparent;
                transition: border-color 0.2s ease;
            }

            #liveMap a:hover {
                border-bottom-color: #f22163;
            }

            #liveMapDesc {
                margin-top: 0.5em;
                font-size: 0.85em;
                color: rgba(187, 187, 187, 0.9);
            }

            .footer {
                padding: 20px;
                font-size: 0.8em;
                color: rgba(187, 187, 187, 0.9);
                background-color: black;
                text-align: center;
            }

            #Logo {
                width: 200px;
                height: 200px;
                padding-bottom: 20px;
            }

            #Letter-Box {
                stroke: #efefef;
                fill: #000000;
            }

            #Letter-P {
                fill: #efefef;
            }

            #particles-js {
                position: absolute;
                width: 100%;
                height: 100%;
                opacity: 0.9;
                background-color: #0000;
            }
            /* ============================================================
               Mobile optimisation
               - Dim the particle field so it stops competing with copy
               - Soft dark scrim behind the text for contrast
               - Breathing room at screen edges + slightly smaller heading
               ============================================================ */
            @media (max-width: 768px) {
                /* 1. Push the particle layer back */
                #particles-js {
                    opacity: 0.4;
                }

                /* 2. Edge padding so text doesn't touch the screen sides */
                #ppp {
                    width: 100%;
                    padding-left: 1.25rem;
                    padding-right: 1.25rem;
                }

                /* 3. Contrast scrim sitting behind the copy (not the whole screen).
                      The radial gradient is darkest behind the text and fades out,
                      so particles stay visible at the edges. */
                #ppp {
                    position: relative;
                }
                #ppp::before {
                    content: "";
                    position: absolute;
                    inset: -1rem;
                    z-index: -1;
                    background: radial-gradient(
                        ellipse at center,
                        rgba(0, 0, 0, 0.85) 0%,
                        rgba(0, 0, 0, 0.7) 55%,
                        rgba(0, 0, 0, 0) 100%
                    );
                    pointer-events: none;
                }

                /* 4. Ease the cramped heading on narrow screens */
                #ppp .title {
                    font-size: 1.5rem;
                    line-height: 1.4;
                }
            }

            /* ============================================================
               Accessibility: respect the OS "reduce motion" setting.
               Fades the animated particle field right back regardless of
               screen size, for users who asked for less motion.
               ============================================================ */
            @media (prefers-reduced-motion: reduce) {
                #particles-js {
                    opacity: 0.2;
                }
            }
        </style>

        <title>Science + Art</title>
    </head>

    <body>
        <main>
            <!-- particles.js container -->
            <div id="particles-js"></div>

            <section class="hero is-fullheight">
                <div class="hero-body">
                    <div class="container has-text-centered">
                        <svg
                            id="Logo"
                            data-name="Layer 1"
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 615 615"
                        >
                            <defs>
                                <style>
                                    .cls-1 {
                                        fill: none;
                                        stroke: #000;
                                        stroke-miterlimit: 10;
                                        stroke-width: 15px;
                                    }
                                    .cls-2 {
                                        font-size: 420px;
                                        font-family:
                                            HelveticaNeue-ThinItalic,
                                            Helvetica Neue;
                                        font-weight: 200;
                                        font-style: italic;
                                    }
                                </style>
                            </defs>
                            <title>Logo</title>
                            <rect
                                id="Letter-Box"
                                class="cls-1"
                                x="7.5"
                                y="7.5"
                                width="600"
                                height="600"
                                rx="100"
                            />
                            <text
                                id="Letter-P"
                                class="cls-2"
                                transform="translate(183.47 460.99)"
                            >
                                P
                            </text>
                        </svg>

                        <div id="portfolioMenu">
                            <p data-scrambler-menu>Science + Art</p>
                        </div>

                        <div id="ppp" class="container">
                            <h1 data-scrambler class="title is-5">
                                I design and build things that are beautiful & <i>just work</i>
                            </h1>
                            <p data-scrambler class="subtitle is-6">
                                Working across engineering and design
                                — the interesting problems live in between.
                            </p>
                            <p id="liveMap">
                                <a
                                    href="https://web-production-b0cc1.up.railway.app/@-36.84046,174.76275,13z"
                                    data-scrambler
                                    target="_blank"
                                    rel="noopener"
                                >
                                    <span class="icon" aria-hidden="true">
                                        <svg viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor">
                                            <path d="M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z"/>
                                        </svg>
                                    </span>
                                    Explore the live transit map
                                </a>
                            </p>
                            <p id="liveMapDesc" data-scrambler>
                                Real-time visualisation of buses, trains, and ferries moving
                                across Auckland.
                            </p>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>Always building.</p>
            <!-- Social links e.g., GitHub and LinkedIn. -->
        </footer>
        <script src="./dist/scrambler.min.js"></script>
        <script src="./dist/scrambleEffect.js"></script>
        <script src="./dist/particles.js"></script>
        <script src="./dist/particlesSetting.js"></script>
    </body>
</html>
