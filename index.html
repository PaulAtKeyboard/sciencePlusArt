            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
        />

        />

        />

        <style>
            html {
                background: black;
            }

            body {
                font-family: "Roboto Mono", monospace;
            }

            .hero-body {
                background-color: black;
            }

            @media only screen and (min-width: 768px) {
                #ppp {
                    width: 90%;
                }
            }

            @media only screen and (min-width: 992px) {
                #ppp {
                    width: 60%;
                }
            }

            #ppp .title {
                margin-bottom: 1.5em;
            }

            #ppp .subtitle {
                max-width: 480px;
                margin-left: auto;
                margin-right: auto;
            }

            #portfolioMenu {
                padding: 0;
                margin-bottom: 2em;
                color: #f22163;
                font-size: 16pt;
                font-style: italic;
            }

            .footer {
                padding: 20px;
                font-size: 0.8em;
                color: rgba(187, 187, 187, 0.8);
                background-color: black;
                text-align: center;
            }

            #Logo {
                width: 200px;
                height: 200px;
                padding-bottom: 20px;
            }

            #Letter-Box {
                stroke: #efefef;
                fill: #000000;
            }

            #Letter-P {
                fill: #efefef;
            }

            #particles-js {
                position: absolute;
                width: 100%;
                height: 100%;
                background-color: #0000;
            }
        </style>

        <title>Science + Art</title>
    </head>

    <body>
        <main>
            <!-- particles.js container -->
            <div id="particles-js"></div>

            <section class="hero is-fullheight">
                <div class="hero-body">
                    <div class="container has-text-centered">
                        <svg
                            id="Logo"
                            data-name="Layer 1"
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 615 615"
                        >
                            <defs>
                                <style>
                                    .cls-1 {
                                        fill: none;
                                        stroke: #000;
                                        stroke-miterlimit: 10;
                                        stroke-width: 15px;
                                    }
                                    .cls-2 {
                                        font-size: 420px;
                                        font-family:
                                            HelveticaNeue-ThinItalic,
                                            Helvetica Neue;
                                        font-weight: 200;
                                        font-style: italic;
                                    }
                                </style>
                            </defs>
                            <title>Logo</title>
                            <rect
                                id="Letter-Box"
                                class="cls-1"
                                x="7.5"
                                y="7.5"
                                width="600"
                                height="600"
                                rx="100"
                            />
                            <text
                                id="Letter-P"
                                class="cls-2"
                                transform="translate(183.47 460.99)"
                            >
                                P
                            </text>
                        </svg>

                        <div id="portfolioMenu">
                            <p data-scrambler-menu>Science + Art</p>
                        </div>

                        <div id="ppp" class="container">
                            <h1 data-scrambler class="title is-5">
                                I design and build things that are beautiful & <i>just works</i>
                            </h1>
                            <p data-scrambler class="subtitle is-6">
                                Working across engineering and design
                                — the interesting problems live in between.
                            </p>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>Always building.</p>
